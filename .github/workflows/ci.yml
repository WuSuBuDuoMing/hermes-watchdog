name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Syntax check server.js
        run: node --check server.js

      - name: Syntax check services/*.js
        run: |
          for f in services/*.js; do
            echo "Checking $f ..."
            node --check "$f"
          done
